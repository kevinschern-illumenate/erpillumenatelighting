# ── Tape/Neon Templates ──────────────────────────────────────────────
# LED Neon templates include mounting, finish, endcap, and IP options.
tape_neon_templates:
  - template_code: non-pnc-sw
    template_name: "Pinnacle [DB] Static white LED Neon"
    product_category: LED Neon
    series: NeonFlex
    default_tape_spec: NON-PNC-SW-67-27K-150-WH
    base_price_msrp: 5
    price_per_ft_msrp: 48.00
    pricing_length_basis: L_tape_cut
    leader_allowance_mm: 15
    allowed_tape_specs:
      - tape_spec: NON-PNC-SW-67-27K-150-WH
        is_default: false
        environment_rating: Wet
      - tape_spec: NON-PNC-SW-67-30K-150-WH
        is_default: false
        environment_rating: Wet
      - tape_spec: NON-PNC-SW-67-35K-150-WH
        is_default: false
        environment_rating: Wet
      - tape_spec: NON-PNC-SW-67-40K-150-WH
        is_default: false
        environment_rating: Wet
      - tape_spec: NON-PNC-SW-67-27K-250-WH
        is_default: true
        environment_rating: Wet
      - tape_spec: NON-PNC-SW-67-30K-250-WH
        is_default: false
        environment_rating: Wet
      - tape_spec: NON-PNC-SW-67-35K-250-WH
        is_default: false
        environment_rating: Wet
      - tape_spec: NON-PNC-SW-67-40K-250-WH
        is_default: false
        environment_rating: Wet
    allowed_options:
      # CCT
      - option_type: CCT
        value: "2700K"
        is_default: true
        msrp_adder: 0
      - option_type: CCT
        value: "3000K"
        msrp_adder: 0
      - option_type: CCT
        value: "3500K"
        msrp_adder: 0
      - option_type: CCT
        value: "4000K"
        msrp_adder: 0
      # Output Level
      - option_type: Output Level
        value: 150lm/ft
        is_default: false
        msrp_adder: 0
      - option_type: Output Level
        value: 250lm/ft
        msrp_adder: 0
      # Environment Rating
      - option_type: Environment Rating
        value: Wet
        is_default: true
        msrp_adder: 0
      # IP Rating (neon-specific)
      - option_type: IP Rating
        value: IP67
        is_default: true
        msrp_adder: 0
      - option_type: IP Rating
        value: IP68
        msrp_adder: 5.00
      # Feed Direction
      - option_type: Feed Direction
        value: End
        feed_position: Both
        is_active: true
        msrp_adder: 0
      - option_type: Feed Direction
        value: Back
        feed_position: Both
        is_active: true
        msrp_adder: 0
      - option_type: Feed Direction
        value: Left
        feed_position: Both
        is_active: true
        msrp_adder: 0
      - option_type: Feed Direction
        value: Right
        feed_position: Both
        is_active: true
        msrp_adder: 0
      # Finish (neon-specific)
      - option_type: Finish
        value: White
        is_default: true
        msrp_adder: 0

# ── Neon Submittal Mapping ───────────────────────────────────────────
neon_submittal_mapping:
